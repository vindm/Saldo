# RU jurisdiction — authorities, portals, terminology, currency.
# Extracted from policies/INSTRUCTIONS.md, safety-rules.md, system-map.md (2026-06-23).
# This is the runtime's lookup table: shared checklists/templates refer to
# {{authority}}, {{currency}}, {{term:...}} etc. and resolve them HERE, so no RF
# name is hardcoded in shared text. Instruction layer is English (locale-independent);
# the RU rendering the operator sees is produced by the locale layer, not here.

code: ru
name: "Russian Federation"
currency: "RUB"
currency_symbol: "₽"
period_income_label: "USN income"

tax_authority: "FTS (Federal Tax Service)"
social_authority: "Social Fund (SFR)"
statistics_authority: "Rosstat"

filing_systems: ["Kontur.Extern", "SBIS", "direct"]
accounting_system: "1C:Fresh"
fiscal_data_operator: "OFD"
company_registry: "EGRUL / EGRIP"
practice_management: "Finkoper"
direct_bank_portals: ["T-Bank Business", "Alfa-Business"]

# Abstract concept -> the term used in the (English) instruction layer.
term_map:
  tax_account: "ENP / ENS (single tax payment / single tax account)"
  classifier_code: "KBK"
  primary_doc: "UPD"
  income_ledger: "KUDIR"
  tax_return: "declaration (SPT has no RU analogue; RU files per-tax returns)"
  statistics_report: "websbor / Rosstat report"

# Regulatory-news sources & topics for THIS jurisdiction. The `news` collector unions
# the `topics` of every jurisdiction in play across the operator's clients, searches each,
# and applies an item ONLY to clients in this jurisdiction. (Adding a jurisdiction's news
# is pure pack data — no engine change.)
news:
  language: ru
  primary_sources: ["nalog.gov.ru", "minfin.gov.ru", "publication.pravo.gov.ru"]
  commentary_sources: ["klerk.ru", "buh.ru", "glavbukh.ru", "consultant.ru", "garant.ru"]
  topics:
    - { id: tax_code_changes,   label: "Tax Code / government decrees", relevance: all }
    - { id: fts_minfin_letters, label: "FTS / Ministry of Finance / SFR letters", relevance: all }
    - { id: usn,                label: "USN (income 6%) + the VAT-on-USN threshold", relevance: "regime=USN" }
    - { id: patent,             label: "Patent (PSN) changes", relevance: "regime=PSN" }
    - { id: ausn,               label: "AUSN changes", relevance: "regime=AUSN" }
    - { id: sp_contributions,   label: "SP insurance contributions / 1%", relevance: all }
    - { id: ens_enp,            label: "Single tax account (ENS/ENP) / notifications", relevance: all }
    - { id: kkt_54fz,           label: "54-FZ / online cash registers / OFD", relevance: "has_kassa" }
    - { id: stats_reporting,    label: "Statistics reporting (Rosstat/websbor)", relevance: "websbor_required" }
  exclude: ["UKEP / electronic signature (KEP/ECP) — not the operator's area", "foreign-source items"]
