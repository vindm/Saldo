# ── Daily TER — for non-permanent daily/weekly/piece workers ─────────────────────────────
ter_daily:
  - { up_to: 450000,  rate: 0 }
  - { up_to: 2500000, rate: 0.005 }

# ── December / final-masa annual true-up — Pasal 17 (1)(a) UU PPh (HPP) progressive ──────
# Masa Desember: PPh21_year = Pasal17(PKP); PKP = annual_gross − biaya_jabatan − annual PTKP;
# December withholding = PPh21_year − sum(Jan..Nov monthly TER).
annual_scale:
  biaya_jabatan:            # deductible "occupational cost"
    rate: 0.05
    annual_cap: 6000000     # 500,000 / month
  brackets:                 # progressive on annual PKP
    - { up_to: 60000000,   rate: 0.05 }
    - { up_to: 250000000,  rate: 0.15 }
    - { up_to: 500000000,  rate: 0.25 }
    - { up_to: 5000000000, rate: 0.30 }
    - { up_to: null,       rate: 0.35 }

# Non-resident (tax_residency=non_id): NOT TER — flat PPh 26 20% of gross, no PTKP.
pph26:
  rate: 0.20
