# ID jurisdiction — PPh 21 computation data (TER + PTKP + annual scale).
#
# Pack DATA the runtime reads to compute monthly PPh 21 from gross — there is NO Python
# calculator; the runtime applies these tables per `checklists/payroll-pph21-bpjs.md §E`.
#
# Provenance: PP 58/2023 + PMK 168/2023 (TER effective from 2024-01-01); Pasal 17 UU PPh
# (HPP) progressive scale. **Statutory — verify against the PMK 168/2023 lampiran on the
# date of use before relying** (rates/thresholds change; the checklist mandates this).
# Currency IDR. All `up_to` bounds are INCLUSIVE monthly gross; `null` = no upper bound.

# ── PTKP (annual non-taxable income) by status, and the status → TER-category map ────────
ptkp:
  # base 54,000,000 (self) + 4,500,000 if married + 4,500,000 per dependent (max 3)
  amounts:
    "TK/0": 54000000
    "TK/1": 58500000
    "TK/2": 63000000
    "TK/3": 67500000
    "K/0":  58500000
    "K/1":  63000000
    "K/2":  67500000
    "K/3":  72000000
  # which monthly-TER table applies to each PTKP status
  ter_category:
    "TK/0": A
    "TK/1": A
    "K/0":  A
    "TK/2": B
    "TK/3": B
    "K/1":  B
    "K/2":  B
    "K/3":  C

# ── Monthly TER (Tarif Efektif Rata-rata) — applied to gross for Masa Jan–Nov ────────────
